name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.5.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  linux-desktop-release:
    runs-on: ubuntu-latest
    env:
      DEVSYNAPSE_UPDATER_ENDPOINT: ${{ vars.DEVSYNAPSE_UPDATER_ENDPOINT }}
      DEVSYNAPSE_UPDATER_PUBLIC_KEY: ${{ vars.DEVSYNAPSE_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve release metadata
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag="${DISPATCH_TAG:-${GITHUB_REF_NAME}}"
          version="${tag#v}"
          notes_file="docs/releases/${tag}.md"

          if [ ! -f "$notes_file" ]; then
            echo "Release notes not found: $notes_file" >&2
            exit 1
          fi

          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES=$notes_file" >> "$GITHUB_ENV"

      - name: Check updater configuration
        run: |
          set -euo pipefail

          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          test -n "$DEVSYNAPSE_UPDATER_PUBLIC_KEY"
          test -n "$DEVSYNAPSE_UPDATER_ENDPOINT"

          configured_pubkey="$(python3 -c 'import json; print(json.load(open("frontend/src-tauri/tauri.updater.conf.json"))["plugins"]["updater"]["pubkey"])')"
          configured_endpoint="$(python3 -c 'import json; print(json.load(open("frontend/src-tauri/tauri.updater.conf.json"))["plugins"]["updater"]["endpoints"][0])')"
          test "$DEVSYNAPSE_UPDATER_PUBLIC_KEY" = "$configured_pubkey"
          test "$DEVSYNAPSE_UPDATER_ENDPOINT" = "$configured_endpoint"

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            rpm \
            wget

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install backend dependencies
        run: |
          python -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/pip install -r requirements-dev.txt -c requirements-dev.lock

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Verify repository
        run: make verify

      - name: Run UI smoke test
        run: make ui-smoke

      - name: Check dependency health
        run: |
          ./venv/bin/pip check
          cd frontend
          npm audit --audit-level=high

      - name: Build signed desktop artifacts
        run: make desktop-build-updates

      - name: Collect release artifacts
        run: |
          set -euo pipefail

          release_dir="dist/release/${RELEASE_TAG}"
          mkdir -p "$release_dir"

          cp "frontend/src-tauri/target/release/bundle/deb/DevSynapse AI_${RELEASE_VERSION}_amd64.deb" \
            "$release_dir/DevSynapse_AI_${RELEASE_VERSION}_amd64.deb"
          cp "frontend/src-tauri/target/release/bundle/rpm/DevSynapse AI-${RELEASE_VERSION}-1.x86_64.rpm" \
            "$release_dir/DevSynapse_AI-${RELEASE_VERSION}-1.x86_64.rpm"
          cp "dist/devsynapse-backend" \
            "$release_dir/devsynapse-backend-x86_64-unknown-linux-gnu"
          cp "$RELEASE_NOTES" "$release_dir/RELEASE_NOTES.md"

          find frontend/src-tauri/target/release/bundle \
            -type f -name "*.sig" \
            -print0 |
            while IFS= read -r -d '' artifact; do
              sanitized="$(basename "$artifact" | tr ' ' '_')"
              cp "$artifact" "$release_dir/$sanitized"
            done

          updater_bundle="$release_dir/DevSynapse_AI_${RELEASE_VERSION}_amd64.deb"
          if [ ! -f "$updater_bundle" ]; then
            echo "No updater .deb artifact was generated." >&2
            exit 1
          fi

          signature_file="${updater_bundle}.sig"
          if [ ! -f "$signature_file" ]; then
            echo "Updater signature not found: $signature_file" >&2
            exit 1
          fi

          python3 scripts/generate-tauri-update-manifest.py \
            --version "$RELEASE_VERSION" \
            --platform linux-x86_64 \
            --url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/$(basename "$updater_bundle")" \
            --signature-file "$signature_file" \
            --notes "DevSynapse AI ${RELEASE_TAG}" \
            --output "$release_dir/latest.json"

          (
            cd "$release_dir"
            sha256sum * > SHA256SUMS
          )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_dir="dist/release/${RELEASE_TAG}"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "DevSynapse AI ${RELEASE_TAG}" \
              --notes-file "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" \
              --title "DevSynapse AI ${RELEASE_TAG}" \
              --notes-file "$RELEASE_NOTES"
          fi

          gh release upload "$RELEASE_TAG" "$release_dir"/* --clobber
