name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.3.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag="${DISPATCH_TAG:-${GITHUB_REF_NAME}}"
          notes_file="docs/releases/${tag}.md"

          if [ ! -f "$notes_file" ]; then
            echo "Release notes not found: $notes_file" >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; leaving it unchanged."
            exit 0
          fi

          gh release create "$tag" \
            --title "DevSynapse AI $tag" \
            --notes-file "$notes_file"
