name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.5.1"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DEVSYNAPSE_UPDATER_ENDPOINT: ${{ vars.DEVSYNAPSE_UPDATER_ENDPOINT }}
  DEVSYNAPSE_UPDATER_PUBLIC_KEY: ${{ vars.DEVSYNAPSE_UPDATER_PUBLIC_KEY }}
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  linux-desktop-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve release metadata
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag="${DISPATCH_TAG:-${GITHUB_REF_NAME}}"
          version="${tag#v}"
          notes_file="docs/releases/${tag}.md"

          if [ ! -f "$notes_file" ]; then
            echo "Release notes not found: $notes_file" >&2
            exit 1
          fi

          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES=$notes_file" >> "$GITHUB_ENV"

      - name: Check updater configuration
        run: |
          set -euo pipefail

          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          test -n "$DEVSYNAPSE_UPDATER_PUBLIC_KEY"
          test -n "$DEVSYNAPSE_UPDATER_ENDPOINT"

          configured_pubkey="$(python3 -c 'import json; print(json.load(open("frontend/src-tauri/tauri.updater.conf.json"))["plugins"]["updater"]["pubkey"])')"
          configured_endpoint="$(python3 -c 'import json; print(json.load(open("frontend/src-tauri/tauri.updater.conf.json"))["plugins"]["updater"]["endpoints"][0])')"
          test "$DEVSYNAPSE_UPDATER_PUBLIC_KEY" = "$configured_pubkey"
          test "$DEVSYNAPSE_UPDATER_ENDPOINT" = "$configured_endpoint"

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            rpm \
            wget

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install backend dependencies
        run: |
          python -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/pip install -r requirements-dev.txt -c requirements-dev.lock

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Verify repository
        run: make verify

      - name: Run UI smoke test
        run: make ui-smoke

      - name: Check dependency health
        run: |
          ./venv/bin/pip check
          cd frontend
          npm audit --audit-level=high

      - name: Build signed Linux desktop artifacts
        run: make desktop-build-updates

      - name: Collect Linux release artifacts
        run: |
          set -euo pipefail

          release_dir="dist/release/linux"
          mkdir -p "$release_dir"

          cp "frontend/src-tauri/target/release/bundle/deb/DevSynapse AI_${RELEASE_VERSION}_amd64.deb" \
            "$release_dir/DevSynapse_AI_${RELEASE_VERSION}_amd64.deb"
          cp "frontend/src-tauri/target/release/bundle/deb/DevSynapse AI_${RELEASE_VERSION}_amd64.deb.sig" \
            "$release_dir/DevSynapse_AI_${RELEASE_VERSION}_amd64.deb.sig"
          cp "frontend/src-tauri/target/release/bundle/rpm/DevSynapse AI-${RELEASE_VERSION}-1.x86_64.rpm" \
            "$release_dir/DevSynapse_AI-${RELEASE_VERSION}-1.x86_64.rpm"
          cp "frontend/src-tauri/target/release/bundle/rpm/DevSynapse AI-${RELEASE_VERSION}-1.x86_64.rpm.sig" \
            "$release_dir/DevSynapse_AI-${RELEASE_VERSION}-1.x86_64.rpm.sig"
          cp "dist/devsynapse-backend" \
            "$release_dir/devsynapse-backend-x86_64-unknown-linux-gnu"

          test -f "$release_dir/DevSynapse_AI_${RELEASE_VERSION}_amd64.deb.sig"

      - name: Upload Linux release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-linux
          path: dist/release/linux/*
          if-no-files-found: error

  windows-desktop-release:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve release metadata
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag="${DISPATCH_TAG:-${GITHUB_REF_NAME}}"
          version="${tag#v}"
          notes_file="docs/releases/${tag}.md"

          if [ ! -f "$notes_file" ]; then
            echo "Release notes not found: $notes_file" >&2
            exit 1
          fi

          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES=$notes_file" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check updater configuration
        run: |
          set -euo pipefail

          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          test -n "$DEVSYNAPSE_UPDATER_PUBLIC_KEY"
          test -n "$DEVSYNAPSE_UPDATER_ENDPOINT"

          configured_pubkey="$(python -c 'import json; print(json.load(open("frontend/src-tauri/tauri.updater.conf.json"))["plugins"]["updater"]["pubkey"])')"
          configured_endpoint="$(python -c 'import json; print(json.load(open("frontend/src-tauri/tauri.updater.conf.json"))["plugins"]["updater"]["endpoints"][0])')"
          test "$DEVSYNAPSE_UPDATER_PUBLIC_KEY" = "$configured_pubkey"
          test "$DEVSYNAPSE_UPDATER_ENDPOINT" = "$configured_endpoint"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Windows backend sidecar
        run: PYTHON=python bash scripts/build-backend.sh

      - name: Smoke packaged Windows sidecar
        run: ./dist/devsynapse-backend.exe --help

      - name: Build signed Windows desktop artifacts
        run: |
          cd frontend
          npm run tauri:build:updates

      - name: Collect Windows release artifacts
        run: |
          set -euo pipefail

          release_dir="dist/release/windows"
          mkdir -p "$release_dir"

          cp "dist/devsynapse-backend.exe" \
            "$release_dir/devsynapse-backend-x86_64-pc-windows-msvc.exe"

          find frontend/src-tauri/target/release/bundle \
            -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.sig" \) \
            -print0 |
            while IFS= read -r -d '' artifact; do
              sanitized="$(basename "$artifact" | tr ' ' '_')"
              cp "$artifact" "$release_dir/$sanitized"
            done

          windows_updater="$(find "$release_dir" -maxdepth 1 -type f -name "*setup.exe" | sort | head -n 1)"
          if [ -z "$windows_updater" ]; then
            windows_updater="$(find "$release_dir" -maxdepth 1 -type f -name "*.msi" | sort | head -n 1)"
          fi
          if [ -z "$windows_updater" ]; then
            echo "No Windows updater installer was generated." >&2
            find "$release_dir" -maxdepth 1 -type f -print >&2
            exit 1
          fi

          test -f "${windows_updater}.sig"

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-windows
          path: dist/release/windows/*
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - linux-desktop-release
      - windows-desktop-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve release metadata
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag="${DISPATCH_TAG:-${GITHUB_REF_NAME}}"
          version="${tag#v}"
          notes_file="docs/releases/${tag}.md"

          if [ ! -f "$notes_file" ]; then
            echo "Release notes not found: $notes_file" >&2
            exit 1
          fi

          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES=$notes_file" >> "$GITHUB_ENV"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: dist/release/assets
          merge-multiple: true

      - name: Generate updater manifest and checksums
        run: |
          set -euo pipefail

          release_dir="dist/release/assets"
          cp "$RELEASE_NOTES" "$release_dir/RELEASE_NOTES.md"

          linux_updater="DevSynapse_AI_${RELEASE_VERSION}_amd64.deb"
          if [ ! -f "$release_dir/$linux_updater" ]; then
            echo "Linux updater bundle not found: $linux_updater" >&2
            exit 1
          fi
          if [ ! -f "$release_dir/${linux_updater}.sig" ]; then
            echo "Linux updater signature not found: ${linux_updater}.sig" >&2
            exit 1
          fi

          windows_updater="$(find "$release_dir" -maxdepth 1 -type f -name "*setup.exe" -printf "%f\n" | sort | head -n 1)"
          if [ -z "$windows_updater" ]; then
            windows_updater="$(find "$release_dir" -maxdepth 1 -type f -name "*.msi" -printf "%f\n" | sort | head -n 1)"
          fi
          if [ -z "$windows_updater" ]; then
            echo "Windows updater bundle not found." >&2
            find "$release_dir" -maxdepth 1 -type f -printf "%f\n" >&2
            exit 1
          fi
          if [ ! -f "$release_dir/${windows_updater}.sig" ]; then
            echo "Windows updater signature not found: ${windows_updater}.sig" >&2
            exit 1
          fi

          python3 scripts/generate-tauri-update-manifest.py \
            --version "$RELEASE_VERSION" \
            --platform linux-x86_64 \
            --url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${linux_updater}" \
            --signature-file "$release_dir/${linux_updater}.sig" \
            --platform windows-x86_64 \
            --url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${windows_updater}" \
            --signature-file "$release_dir/${windows_updater}.sig" \
            --notes "DevSynapse AI ${RELEASE_TAG}" \
            --output "$release_dir/latest.json"

          (
            cd "$release_dir"
            rm -f SHA256SUMS
            sha256sum * > SHA256SUMS
          )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_dir="dist/release/assets"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "DevSynapse AI ${RELEASE_TAG}" \
              --notes-file "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" \
              --title "DevSynapse AI ${RELEASE_TAG}" \
              --notes-file "$RELEASE_NOTES"
          fi

          gh release upload "$RELEASE_TAG" "$release_dir"/* --clobber
