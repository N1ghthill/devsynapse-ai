[tool.ruff]
target-version = "py310"
line-length = 100
exclude = [
  "venv",
  "legacy",
  "__pycache__",
  "frontend/node_modules",
  "frontend/dist",
  "tests",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
]
ignore = [
  "B008",
  "E402",
  "E501",
  "E722",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
